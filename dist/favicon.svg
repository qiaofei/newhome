  <rect x="19" y="17" width="4" height="4" 
        fill="#FFFFFF" stroke="#1E40AF" stroke-width="1.5" rx="0.5"/>
  
  <!-- 窗户分割线 -->
  <line x1="11" y1="17" x2="11" y2="21" stroke="#1E40AF" stroke-width="1"/>
  <line x1="9" y1="19" x2="13" y2="19" stroke="#1E40AF" stroke-width="1"/>
  <line x1="21" y1="17" x2="21" y2="21" stroke="#1E40AF" stroke-width="1"/>
  <line x1="19" y1="19" x2="23" y2="19" stroke="#1E40AF" stroke-width="1"/>
  
  <!-- 设计元素：调色板 -->
  <circle cx="24" cy="10" r="3" fill="#F59E0B" stroke="#D97706" stroke-width="1"/>
  <circle cx="25" cy="9" r="0.8" fill="#FFFFFF"/>
  <circle cx="23" cy="11" r="0.6" fill="#EF4444"/>
  <circle cx="25" cy="11" r="0.6" fill="#10B981"/>
