server {
    listen 8090;
    server_name localhost;
    
    # 设置根目录为design文件夹
    root /root/newhome/design;
    
    # 默认首页
    index home.html index.html;
    
    # 启用gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # 静态资源缓存设置
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 主页路由
    location = / {
        try_files /home.html =404;
    }
    
    # 关于页面
    location = /about {
        try_files /about.html =404;
    }
    
    location = /about/ {
        try_files /about.html =404;
    }
    
    # 联系页面
    location = /contact {
        try_files /contact.html =404;
    }
    
    location = /contact/ {
        try_files /contact.html =404;
    }
    
    # 项目页面
    location = /projects {
        try_files /projects.html =404;
    }
    
    location = /projects/ {
        try_files /projects.html =404;
    }
    
    # 服务页面
    location = /services {
        try_files /services.html =404;
    }
    
    location = /services/ {
        try_files /services.html =404;
    }
    
    # 主页的其他路径
    location = /home {
        try_files /home.html =404;
    }
    
    location = /home/ {
        try_files /home.html =404;
    }
    
    # assets静态资源
    location /assets/ {
        try_files $uri =404;
    }
    
    # 处理HTML文件的直接访问
    location ~ \.html$ {
        try_files $uri =404;
    }
    
    # 错误页面
    error_page 404 /home.html;
    error_page 500 502 503 504 /home.html;
    
    # 安全设置
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    
    # 隐藏nginx版本
    server_tokens off;
    
    # 日志设置
    access_log /var/log/nginx/website_access.log;
    error_log /var/log/nginx/website_error.log;
}
