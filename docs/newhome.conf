server {
    listen 80;
    server_name newhomedesignmanagement.com www.newhomedesignmanagement.com;  # 替换为你的域名
    
    # 使用 Cloudflare 时不需要重定向，Cloudflare 会自动处理
    # return 301 https://$server_name$request_uri;
    
    # 网站根目录，指向 dist 文件夹
    root /home/ubuntu/newhome/dist;  # 替换为你的实际路径
    index index.html;
    
    # 启用 Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 静态资源缓存策略
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # 处理跨域请求 (如果需要)
        # add_header Access-Control-Allow-Origin "*";
        
        try_files $uri =404;
    }
    
    # assets 目录特殊处理
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        try_files $uri =404;
    }
    
    # avatars 目录处理
    location /avatars/ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        try_files $uri =404;
    }
    
    # favicon.ico
    location = /favicon.ico {
        expires 30d;
        add_header Cache-Control "public";
        log_not_found off;
        access_log off;
    }
    
    # robots.txt (如果有的话)
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }
    
    # HTML 文件不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
    
    # Vue Router 历史模式支持 - 所有路由都回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
        
        # HTML 文件不缓存
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
    
    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
    
    # 日志配置
    access_log /var/log/nginx/newhome_access.log;
    error_log /var/log/nginx/newhome_error.log;
}

# 使用 Cloudflare SSL 时，nginx 只需要监听 80 端口
