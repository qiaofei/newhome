<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#f0f9ff"/>
  
  <!-- Face -->
  <circle cx="100" cy="90" r="45" fill="#fbbf24"/>
  
  <!-- Hair -->
  <path d="M55 70 Q100 40 145 70 Q140 50 100 45 Q60 50 55 70" fill="#374151"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="80" r="4" fill="#1f2937"/>
  <circle cx="115" cy="80" r="4" fill="#1f2937"/>
  <circle cx="86" cy="78" r="1" fill="#ffffff"/>
  <circle cx="116" cy="78" r="1" fill="#ffffff"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="90" rx="2" ry="3" fill="#f59e0b"/>
  
  <!-- Mouth -->
  <path d="M90 100 Q100 110 110 100" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Glasses -->
  <circle cx="85" cy="80" r="12" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="115" cy="80" r="12" fill="none" stroke="#374151" stroke-width="2"/>
  <line x1="97" y1="80" x2="103" y2="80" stroke="#374151" stroke-width="2"/>
  
  <!-- Body -->
  <rect x="70" y="130" width="60" height="70" rx="10" fill="#065f46"/>
  
  <!-- Collar -->
  <rect x="75" y="130" width="50" height="15" fill="#10b981"/>
</svg>
